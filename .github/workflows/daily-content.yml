name: Daily Content Plan

on:
  schedule:
    - cron: '0 8 * * *'
      timezone: Asia/Shanghai
  workflow_dispatch:

concurrency:
  group: daily-content-plan
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily content plan
        id: daily
        env:
          BACKEND_INTERNAL_API_URL: ${{ secrets.BACKEND_INTERNAL_API_URL }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          BRAND_VOICE: ${{ vars.BRAND_VOICE }}
          CONTENT_TYPE: ${{ vars.CONTENT_TYPE }}
          LANGUAGE: ${{ vars.LANGUAGE }}
        run: npm run daily

      - name: Resolve report file
        id: report
        if: success()
        run: |
          set -euo pipefail
          REPORT_FILE=$(ls -1 generated/daily/*.md | sort | tail -1)
          echo "report_file=${REPORT_FILE}" >> "$GITHUB_OUTPUT"
          echo "report_date=$(basename "${REPORT_FILE}" .md)" >> "$GITHUB_OUTPUT"

      - name: Commit report to repository
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          REPORT_FILE="${{ steps.report.outputs.report_file }}"
          git add "${REPORT_FILE}"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(daily): content plan for $(basename "${REPORT_FILE}" .md)"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Upload report artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ steps.report.outputs.report_date }}
          path: ${{ steps.report.outputs.report_file }}
          if-no-files-found: error

      - name: Notify Feishu
        if: always()
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"
          RUN_URL="${REPO_URL}/actions/runs/${GITHUB_RUN_ID}"
          REPORT_FILE="${{ steps.report.outputs.report_file }}"
          REPORT_URL=""
          if [ -n "${REPORT_FILE}" ] && [ -f "${REPORT_FILE}" ]; then
            REPORT_URL="${REPO_URL}/blob/${GITHUB_REF_NAME}/${REPORT_FILE}"
          fi

          if [ "${{ steps.daily.outcome }}" = "success" ] && [ -n "${REPORT_FILE}" ]; then
            node scripts/notify-feishu.mjs \
              --status success \
              --report "${REPORT_FILE}" \
              --report-url "${REPORT_URL}" \
              --run-url "${RUN_URL}"
          else
            node scripts/notify-feishu.mjs \
              --status failure \
              --error "Daily generation failed. Check Actions logs and backend secrets." \
              --run-url "${RUN_URL}"
          fi
